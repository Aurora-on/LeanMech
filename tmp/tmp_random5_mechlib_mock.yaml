dataset:
  source: lean4phys
  limit: 5
  category: Mechanics
  sample_policy: seed_random
  seed: 42
  local_archive:
    root: "F:/AI4Mechanics/数据集/归档"
    mode: text_only
  lean4phys:
    bench_path: "F:/AI4Mechanics/coding/Lean4PHYS/LeanPhysBench/LeanPhysBench_v0.json"
    category: "mechanics"
    level: null
  single_image_only_for_mvp: true

model:
  provider: mock
  model_id: mock-random5
  base_url: null
  api_key: null
  api_key_env: OPENAI_API_KEY
  supports_vision: false
  timeout_s: 60
  max_retries: 2
  extra: {}

lean:
  enabled: true
  physlean_dir: "F:/AI4Mechanics/PhysLean-master"
  mechlib_dir: "F:/AI4Mechanics/coding/MechLib"
  timeout_s: 25
  strict_blocklist: ["sorry", "admit", "axiom"]
  lean_header: "import PhysLean"
  preflight_enabled: true
  route_policy: auto_by_import
  default_backend: physlean
  route_fallback: true

knowledge:
  enabled: true
  mechlib_dir: "F:/AI4Mechanics/coding/MechLib"
  scope: mechanics_si
  top_k: 6
  cache_path: "tmp/mechlib_index.jsonl"
  inject_modules: ["B", "D", "E"]

semantic:
  pass_threshold: 0.7

proof:
  max_attempts: 1

prompts:
  dir: prompts
  a_extract_ir: A_extract_ir.txt
  b_generate_statements: B_generate_statements.txt
  d_semantic_rank: D_semantic_rank.txt
  e_generate_proof: E_generate_proof.txt
  e_repair_proof: E_repair_proof.txt

output:
  output_dir: outputs/latest
  runs_dir: runs
  tag: random5-mechlib-mock
